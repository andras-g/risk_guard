name: Deploy to GCP

# Staging:   manual workflow_dispatch → staging-up / staging-down
# Production: version tag (v*.*.*) → deploy-production (manual approval required)
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Staging action'
        required: true
        type: choice
        options:
          - staging-up
          - staging-down
  push:
    tags:
      - 'v*.*.*'

env:
  REGION: europe-west3
  ARTIFACT_REGISTRY: europe-west3-docker.pkg.dev
  IMAGE_NAME: risk-guard/backend

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Build — shared by staging-up and production
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'staging-up') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    # PostgreSQL service required for Flyway migrations + jOOQ codegen that run
    # before the Docker build. The Dockerfile skips these tasks (-x flywayMigrate
    # -x generateJooq) so generated sources must exist in build/ before docker build.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: riskguard
          POSTGRES_USER: riskguard
          POSTGRES_PASSWORD: localdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    outputs:
      # Pass only the git SHA — the full tag is reconstructed in deploy jobs using the same
      # formula. This avoids the GitHub Actions "secret masking" issue where outputs containing
      # secret values (GCP_PROJECT_ID) are redacted to empty strings in downstream jobs.
      image_sha: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Flyway migrations and generate jOOQ sources
        # The Dockerfile runs `./gradlew build -x flywayMigrate -x generateJooq`
        # which requires pre-generated jOOQ sources in build/generated-sources/jooq/.
        # We generate them here against the CI postgres service (localhost:5432, default creds),
        # then docker build picks them up from build/generated-sources/jooq/.
        run: ./gradlew flywayMigrate generateJooq --no-daemon
        working-directory: backend

      - name: Authenticate to GCP (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CLOUD_RUN_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend Docker image
        run: |
          IMAGE_TAG="${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest"
          docker build \
            --tag "${IMAGE_TAG}" \
            --tag "${IMAGE_LATEST}" \
            --file backend/Dockerfile \
            backend/
          docker push "${IMAGE_TAG}"
          docker push "${IMAGE_LATEST}"

  # ───────────────────────────────────────────────────────────────────────────
  # Staging Up — manual trigger only, no load balancer, no custom domain
  # Access the backend via the Cloud Run URL printed at the end of this job.
  # Access the frontend via: https://storage.googleapis.com/BUCKET/index.html
  # ───────────────────────────────────────────────────────────────────────────
  staging-up:
    name: Staging Up
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'staging-up'
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CLOUD_RUN_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Backend: Deploy to Cloud Run (staging) ──────────────────────────
      # min-instances=0: scales to zero when idle — no fixed cost.
      # No load balancer — access via the auto-generated Cloud Run URL.
      - name: Deploy backend to Cloud Run (staging)
        run: |
          gcloud run deploy ${{ vars.CLOUD_RUN_SERVICE_STAGING }} \
            --image="${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_sha }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --min-instances=0 \
            --max-instances=10 \
            --set-secrets="NEON_DATABASE_URL=NEON_DATABASE_URL_STAGING:latest,JWT_SECRET=JWT_SECRET_STAGING:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET_STAGING:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID_STAGING:latest,MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET_STAGING:latest,MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID_STAGING:latest,RESEND_API_KEY=RESEND_API_KEY_STAGING:latest" \
            --set-env-vars="SPRING_PROFILES_ACTIVE=staging,FRONTEND_URL=https://storage.googleapis.com/${{ vars.FRONTEND_BUCKET_STAGING }}" \
            --service-account="${{ secrets.CLOUD_RUN_SA_EMAIL }}" \
            --allow-unauthenticated \
            --project="${{ secrets.GCP_PROJECT_ID }}"

      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe ${{ vars.CLOUD_RUN_SERVICE_STAGING }} \
            --region="${{ env.REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "### Staging Backend URL" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"

      # ── Frontend: Build & Deploy to Cloud Storage (staging) ─────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend (Nuxt static generation)
        run: npm run generate
        working-directory: frontend
        env:
          NUXT_PUBLIC_API_BASE: ${{ steps.backend-url.outputs.url }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Deploy frontend to Cloud Storage (staging)
        run: |
          gsutil -m rsync -r -d frontend/.output/public gs://${{ vars.FRONTEND_BUCKET_STAGING }}
          gsutil iam ch allUsers:objectViewer gs://${{ vars.FRONTEND_BUCKET_STAGING }}

      - name: Print staging URLs
        run: |
          echo "### Staging is UP" >> "$GITHUB_STEP_SUMMARY"
          echo "**Backend:** ${{ steps.backend-url.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Frontend:** https://storage.googleapis.com/${{ vars.FRONTEND_BUCKET_STAGING }}/index.html" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run \`staging-down\` when done to stop the Cloud Run service." >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # Staging Down — manual trigger, deletes Cloud Run service to stop all cost
  # ───────────────────────────────────────────────────────────────────────────
  staging-down:
    name: Staging Down
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'staging-down'
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CLOUD_RUN_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete Cloud Run service (staging)
        run: |
          if gcloud run services describe ${{ vars.CLOUD_RUN_SERVICE_STAGING }} \
              --region="${{ env.REGION }}" \
              --project="${{ secrets.GCP_PROJECT_ID }}" > /dev/null 2>&1; then
            gcloud run services delete ${{ vars.CLOUD_RUN_SERVICE_STAGING }} \
              --region="${{ env.REGION }}" \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --quiet
            echo "### Staging is DOWN" >> "$GITHUB_STEP_SUMMARY"
            echo "Cloud Run service deleted. GCS bucket retained (free)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Staging was already down" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # Deploy to Production — tag push only (v*.*.*)
  # Manual approval required via GitHub environment protection rules
  # ───────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: production  # Requires manual approval in GitHub environment settings
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CLOUD_RUN_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Backend: Deploy to Cloud Run (production) ────────────────────────
      - name: Deploy backend to Cloud Run (production)
        run: |
          # --allow-unauthenticated: public API, Spring Security enforces auth at application layer.
          gcloud run deploy ${{ vars.CLOUD_RUN_SERVICE_PRODUCTION }} \
            --image="${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_sha }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --min-instances=1 \
            --max-instances=10 \
            --add-cloudsql-instances="${{ vars.CLOUD_SQL_CONNECTION_NAME_PROD }}" \
            --set-secrets="DB_PASSWORD=DB_PASSWORD_PRODUCTION:latest,JWT_SECRET=JWT_SECRET_PRODUCTION:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID_PRODUCTION:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET_PRODUCTION:latest,MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID_PRODUCTION:latest,MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET_PRODUCTION:latest,RESEND_API_KEY=RESEND_API_KEY_PRODUCTION:latest" \
            --set-env-vars="SPRING_PROFILES_ACTIVE=prod,INSTANCE_CONNECTION_NAME=${{ vars.CLOUD_SQL_CONNECTION_NAME_PROD }},DB_NAME=riskguard,DB_USER=riskguard,FRONTEND_URL=https://app.riskguard.hu" \
            --service-account="${{ secrets.CLOUD_RUN_SA_EMAIL }}" \
            --allow-unauthenticated \
            --project="${{ secrets.GCP_PROJECT_ID }}"

      # ── Frontend: Build & Deploy to Cloud Storage (production) ──────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend (Nuxt static generation)
        run: npm run generate
        working-directory: frontend
        env:
          NUXT_PUBLIC_API_BASE: ${{ vars.PRODUCTION_CLOUD_RUN_URL }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Deploy frontend to Cloud Storage (production)
        run: |
          gsutil -m rsync -r -d frontend/.output/public gs://${{ vars.FRONTEND_BUCKET_PRODUCTION }}

      - name: Invalidate Cloud CDN cache (production)
        run: |
          gcloud compute url-maps invalidate-cdn-cache risk-guard-frontend-production \
            --path="/*" \
            --global \
            --async \
            --project="${{ secrets.GCP_PROJECT_ID }}"

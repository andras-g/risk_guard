name: 12-Step CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend CI (Steps 1-5, 11-12)
    runs-on: ubuntu-latest
    services:
      # CI postgres service — used exclusively by Steps 4 (flywayMigrate) and 5 (generateOpenApiDocs).
      # Integration tests that use @Testcontainers (e.g. TenantIsolationIntegrationTest) spin up their
      # own isolated PostgreSQL containers on random ports via @ServiceConnection — they do NOT connect
      # to this service. No port conflict occurs because Testcontainers uses ephemeral ports.
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: riskguard
          POSTGRES_USER: riskguard
          POSTGRES_PASSWORD: localdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Step 1: Compile Java"
        run: ./gradlew compileJava
        working-directory: backend

      - name: "Step 2: Run ArchUnit tests"
        # Run all architecture-layer tests (ArchUnit rules live in this package).
        run: ./gradlew test --tests "hu.riskguard.architecture.*"
        working-directory: backend

      - name: "Step 3: Run Spring Modulith verify"
        run: ./gradlew test --tests "hu.riskguard.architecture.ModulithVerificationTest"
        working-directory: backend

      - name: "Step 4: Run Flyway migrations"
        run: ./gradlew flywayMigrate -Dflyway.url=jdbc:postgresql://localhost:5432/riskguard -Dflyway.user=riskguard -Dflyway.password=localdev
        working-directory: backend

      - name: "Step 5: Generate OpenAPI spec"
        run: ./gradlew generateOpenApiDocs -Dspring.main.lazy-initialization=true
        env:
          SPRING_DOCKER_COMPOSE_ENABLED: "false"
          SPRING_DEVTOOLS_RESTART_ENABLED: "false"
        working-directory: backend

      - name: Upload OpenAPI Spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: backend/build/generated/openapi.json

      - name: "Step 11a: Backend Unit Tests"
        run: ./gradlew test -DexcludedGroups=integration
        working-directory: backend

      - name: "Step 12: Backend Integration Tests"
        run: ./gradlew test -Dgroups=integration
        working-directory: backend

  frontend:
    name: Frontend CI (Steps 6-10, 11b)
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Download OpenAPI Spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: backend/build/generated

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: "Step 6: Generate TypeScript types"
        run: npm run generate-types
        working-directory: frontend

      - name: "Step 7: Generate Zod validators"
        run: npm run generate-zod
        working-directory: frontend

      - name: "Step 8: Run ESLint"
        run: npm run lint
        working-directory: frontend

      - name: "Step 9: i18n key parity check"
        run: npm run check-i18n
        working-directory: frontend

      - name: "Step 10: Run tsc --noEmit"
        run: npm run check-types
        working-directory: frontend

      - name: "Step 11b: Run frontend tests"
        run: npm run test
        working-directory: frontend

  e2e:
    name: E2E Tests (Playwright)
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: riskguard
          POSTGRES_USER: riskguard
          POSTGRES_PASSWORD: localdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Run Flyway migrations (schema + test seed data) against the CI postgres service.
      # The test seed migration (R__e2e_test_data.sql) is in src/main/resources/db/test-seed/
      # and is added via the flywayExtraLocations Gradle project property.
      - name: Run Flyway migrations (schema + test seed)
        run: |
          ./gradlew flywayMigrate \
            -PflywayExtraLocations=filesystem:src/main/resources/db/test-seed
        working-directory: backend

      # Start backend in background with test profile.
      # Uses the CI postgres service (port 5432) directly — no Testcontainers or Docker Compose.
      - name: Start backend (Spring Boot with test profile)
        run: |
          ./gradlew bootRun \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/riskguard \
            -Dspring.datasource.username=riskguard \
            -Dspring.datasource.password=localdev \
            -Dspring.docker.compose.enabled=false \
            -Dspring.flyway.enabled=false \
            &
          # Wait for backend to respond (any HTTP response = app is running).
          # /actuator/health may return 503 if a non-critical health indicator is DOWN
          # (e.g., databaseTls on CI PostgreSQL without SSL), so we accept any HTTP response.
          echo "Waiting for backend to start..."
          for i in $(seq 1 60); do
            if HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health 2>/dev/null) && [ "$HTTP_CODE" -ge 100 ] 2>/dev/null; then
              echo "Backend is responding (HTTP $HTTP_CODE)!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Backend failed to start within 120s"
              exit 1
            fi
            sleep 2
          done
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: e2e_ci_secret_must_be_at_least_32_characters_long

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # Start Nuxt dev server in background.
      # After the initial HTTP response succeeds, wait an extra 5s for Nuxt to
      # finish compiling pages — prevents flaky Playwright tests hitting partially-
      # compiled routes.
      - name: Start frontend (Nuxt dev)
        run: |
          npm run dev &
          echo "Waiting for frontend to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is responding — waiting 5s for page compilation..."
              sleep 5
              echo "Frontend is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Frontend failed to start within 60s"
              exit 1
            fi
            sleep 2
          done
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Run Playwright E2E tests
        run: npx playwright test
        working-directory: frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_BASE: http://localhost:8080

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

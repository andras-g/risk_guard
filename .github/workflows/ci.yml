name: 12-Step CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend CI (Steps 1-5, 11-12)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: riskguard
          POSTGRES_USER: riskguard
          POSTGRES_PASSWORD: localdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Step 1: Compile Java"
        run: ./gradlew compileJava
        working-directory: backend

      - name: "Step 2: Run ArchUnit tests"
        run: ./gradlew test --tests "hu.riskguard.architecture.NamingConventionTest"
        working-directory: backend

      - name: "Step 3: Run Spring Modulith verify"
        run: ./gradlew test --tests "hu.riskguard.architecture.ModulithVerificationTest"
        working-directory: backend

      - name: "Step 4: Run Flyway migrations"
        run: ./gradlew flywayMigrate -Dflyway.url=jdbc:postgresql://localhost:5432/riskguard -Dflyway.user=riskguard -Dflyway.password=localdev
        working-directory: backend

      - name: "Step 5: Generate OpenAPI spec"
        run: ./gradlew generateOpenApiDocs
        working-directory: backend

      - name: Upload OpenAPI Spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: backend/build/generated/openapi.json

      - name: "Step 11a: Backend Unit Tests"
        run: ./gradlew test --exclude-task "*IntegrationTest"
        working-directory: backend

      - name: "Step 12: Backend Integration Tests"
        run: ./gradlew test --tests "*IntegrationTest"
        working-directory: backend

  frontend:
    name: Frontend CI (Steps 6-10, 11b)
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Download OpenAPI Spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: backend/build/generated

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: "Step 6: Generate TypeScript types"
        run: npm run generate-types
        working-directory: frontend

      - name: "Step 7: Generate Zod validators"
        run: npm run generate-zod
        working-directory: frontend

      - name: "Step 8: Run ESLint"
        run: npm run lint
        working-directory: frontend

      - name: "Step 9: i18n key parity check"
        run: npm run check-i18n
        working-directory: frontend

      - name: "Step 10: Run tsc --noEmit"
        run: npm run check-types
        working-directory: frontend

      - name: "Step 11b: Run frontend tests"
        run: npm run test
        working-directory: frontend

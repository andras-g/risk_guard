# Staging profile — GCP Cloud Run + Neon PostgreSQL (free tier)
# Activates via SPRING_PROFILES_ACTIVE=staging on Cloud Run.
# Overlays application.yml with staging-specific overrides.
#
# Key difference from prod: uses standard JDBC URL to external Neon PostgreSQL
# over public internet with SSL. No Cloud SQL socket factory needed.
#
# NEON_DATABASE_URL is injected from GCP Secret Manager as a ready-to-use
# JDBC URL: jdbc:postgresql://host/db?user=...&password=...&sslmode=require
# (NOT the postgresql://user:pass@host/db Neon URI format, which the JDBC
# driver cannot parse.)

spring:
  datasource:
    url: ${NEON_DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  # JPA config: jOOQ is the primary data layer. ddl-auto=validate is kept to catch
  # schema drift if JPA entities exist (no DDL changes, validation only).
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
  # ── OAuth2 / SSO — secrets injected from Secret Manager ──
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID:}
            client-secret: ${MICROSOFT_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
              - User.Read
            client-name: Microsoft
        provider:
          google:
            issuer-uri: https://accounts.google.com
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-name-attribute: sub

  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  docker:
    compose:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always   # Full component tree visible without auth in staging
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          # readinessState: Cloud Run's own readiness state
          # db: HikariCP/jOOQ database connectivity check
          # databaseTls and circuitBreakers excluded: TLS is Neon-managed (not ssl_is_used()),
          # and Resilience4j registers per-CB indicators (not a composite 'circuitBreakers').
          include: readinessState,db
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

server:
  port: 8080
  shutdown: graceful
  lifecycle:
    timeout-per-shutdown-phase: 30s

risk-guard:
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-ms: 86400000  # 24h — until refresh token rotation is implemented
    frontend-base-url: ${FRONTEND_URL}
    cookie-secure: true
  identity:
    default-user-role: SME_ADMIN
  freshness:
    fresh-threshold-hours: 6
    stale-threshold-hours: 24
    unavailable-threshold-hours: 48
  guest:
    max-companies: 10
    max-daily-checks: 3
    captcha-after-checks: 3
  tiers: ["ALAP", "PRO", "PRO_EPR"]
  rate-limits:
    searches-per-minute-per-tenant: 30
    max-alerts-per-day-per-tenant: 10
  email:
    enabled: ${EMAIL_ENABLED:true}
    from: ${EMAIL_FROM:alerts@riskguard.hu}
    resend-api-key: ${RESEND_API_KEY:}
  outbox:
    cron: "${OUTBOX_CRON:0 */1 * * * ?}"
    batch-size: 50

logging:
  level:
    root: INFO
    hu.riskguard: INFO
    org.springframework.security: WARN

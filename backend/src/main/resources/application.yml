spring:
  application:
    name: risk-guard
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:riskguard}
    username: ${DB_USER:riskguard}
    password: ${DB_PASSWORD:localdev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  messages:
    basename: messages
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    ignore-migration-patterns: "*:missing"
  devtools:
    restart:
      enabled: ${SPRING_DEVTOOLS_RESTART_ENABLED:false}
    add-properties: false
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:false}
  main:
    lazy-initialization: ${SPRING_MAIN_LAZY_INITIALIZATION:false}
  ai:
    vertex:
      ai:
        gemini:
          project-id: ${GCP_PROJECT_ID:risk-guard-dev}
          location: europe-west1
          chat:
            options:
              model: gemini-3.0-flash-preview
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:fake}
            client-secret: ${GOOGLE_CLIENT_SECRET:fake}
            scope:
              - email
              - profile
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID:fake}
            client-secret: ${MICROSOFT_CLIENT_SECRET:fake}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
              - User.Read
            client-name: Microsoft
        provider:
          google:
            issuer-uri: https://accounts.google.com
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-name-attribute: sub
management:
  endpoint:
    health:
      show-details: always   # Full health component details visible in local dev
  health:
    # Disable TLS health indicator in local dev: local PostgreSQL (Docker Compose) does not use TLS,
    # so ssl_is_used() returns false → databaseTls would always report DOWN locally.
    # The indicator is enabled in staging and production profiles where TLS is enforced.
    databaseTls:
      enabled: false

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}


resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
    instances:
      demo:
        # Inherits slidingWindowSize:10, failureRateThreshold:50, waitDurationInOpenState:60s from default config
        registerHealthIndicator: true
      nav-online-szamla:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      vertex-gemini:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
  retry:
    configs:
      default:
        maxAttempts: 2
        waitDuration: 1s

risk-guard:
   security:
      jwt-secret: ${JWT_SECRET:local-dev-secret-32-chars-long-at-least-123456}
      jwt-expiration-ms: 900000  # 15 minutes — short-lived access token; refresh token handles session continuity
      refresh-token-expiration-days: 30
      frontend-base-url: ${FRONTEND_URL:http://localhost:3000}
      cookie-secure: ${COOKIE_SECURE:false}
   identity:
     default-user-role: SME_ADMIN
     refresh-cookie-name: refresh_token
   freshness:
     fresh-threshold-hours: 6
     stale-threshold-hours: 24
     unavailable-threshold-hours: 48
   guest:
     max-companies: 10
     max-daily-checks: 3
     captcha-after-checks: 3
   tiers: ["ALAP", "PRO", "PRO_EPR"]
   rate-limits:
     searches-per-minute-per-tenant: 30
     max-alerts-per-day-per-tenant: 10
   screening:
     idempotency-guard-minutes: 15
     disclaimer-text: "This search result is provided for informational purposes only. Data is sourced from Hungarian government registries and may not reflect real-time status."
   data-source:
      mode: ${DATA_SOURCE_MODE:demo}
      connect-timeout-ms: 8000
      read-timeout-ms: 8000
      global-deadline-seconds: 20
   async-ingestor:
      cron: "${ASYNC_INGESTOR_CRON:0 0 2 * * ?}"    # 02:00 UTC daily (04:00 Budapest)
      delay-between-requests-ms: ${ASYNC_INGESTOR_DELAY_MS:500}
      # thread-pool-size removed — ingestor runs sequentially on scheduler thread (see RiskGuardProperties TODO)
   watchlist-monitor:
      cron: "${WATCHLIST_MONITOR_CRON:0 0 4 * * ?}"    # 04:00 UTC daily (after AsyncIngestor at 02:00)
      delay-between-evaluations-ms: ${WATCHLIST_MONITOR_DELAY_MS:200}
   email:
      enabled: ${EMAIL_ENABLED:true}
      from: ${EMAIL_FROM:alerts@riskguard.hu}
      resend-api-key: ${RESEND_API_KEY:}
      max-retries-count: 5
      base-backoff-seconds: 30
      max-backoff-seconds: 3600
   outbox:
      cron: "${OUTBOX_CRON:0 */1 * * * ?}"    # Every 60 seconds
      batch-size: ${OUTBOX_BATCH_SIZE:50}
   classifier:
      confidence-threshold: MEDIUM
      monthly-cap: 1000
      batch:
         concurrency: 10          # Story 10.3: max concurrent Gemini calls per batch request
         per-tenant-concurrent: 3 # Story 10.3: max simultaneous batch requests per tenant (BatchPackagingConcurrencyGate)
   epr:
      # ADR-0002 pluggable EprReportTarget strategy. Default: okirkapu-xml. Future: eu-registry
      report:
         target: okirkapu-xml

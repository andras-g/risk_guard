spring:
  application:
    name: risk-guard
  datasource:
    url: jdbc:postgresql://localhost:5432/riskguard
    username: riskguard
    password: localdev
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:fake}
            client-secret: ${GOOGLE_CLIENT_SECRET:fake}
            provider: google
#          microsoft:
#            client-id: ${MICROSOFT_CLIENT_ID:fake}
#            client-secret: ${MICROSOFT_CLIENT_SECRET:fake}
#            provider: microsoft
        provider:
          google:
            issuer-uri: https://accounts.google.com
#          microsoft:
#            issuer-uri: https://login.microsoftonline.com/common/v2.0


risk-guard:
   freshness:
     fresh-threshold-hours: 6
     stale-threshold-hours: 24
     unavailable-threshold-hours: 48
   guest:
     max-companies: 10
     max-daily-checks: 3
     captcha-after-checks: 3
   tiers: ["ALAP", "PRO", "PRO_EPR"]
   rate-limits:
     searches-per-minute-per-tenant: 30
     max-alerts-per-day-per-tenant: 10

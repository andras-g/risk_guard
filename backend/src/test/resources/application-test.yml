spring:
  main:
    allow-bean-definition-overriding: true
  task:
    scheduling:
      # Disable @Scheduled cron triggers during integration tests — prevents AsyncIngestor
      # from firing on the real Testcontainers DB and interfering with test data assertions.
      enabled: false
  datasource:
    url: jdbc:tc:postgresql:17:///riskguard
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/test-seed
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy
            client-secret: dummy
            scope:
              - email
              - profile
          microsoft:
            client-id: dummy
            client-secret: dummy
            authorization-grant-type: authorization_code
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2.0/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
            user-name-attribute: sub
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-name-attribute: sub

management:
  endpoint:
    health:
      show-details: always   # Full health component details visible in integration tests
  health:
    # Disable TLS health indicator in test profile: Testcontainers PostgreSQL does not use TLS,
    # so ssl_is_used() returns false → databaseTls would always report DOWN, polluting overall health.
    databaseTls:
      enabled: false

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
  retry:
    configs:
      default:
        maxAttempts: 2
        waitDuration: 500ms

risk-guard:
  security:
    jwt-secret: dummy_secret_for_testing_32_chars_long_long
    jwt-expiration-ms: 3600000  # 1 hour — longer access token in test profile to prevent E2E test flakes
    refresh-token-expiration-days: 30
    refresh-token-cleanup-cron: "-"  # Disabled in test profile
    frontend-base-url: http://localhost:3000
  identity:
    cookie-name: auth_token
    refresh-cookie-name: refresh_token
    default-tier: ALAP
    default-language: hu
    default-user-role: SME_ADMIN
  freshness:
    fresh-threshold-hours: 6
    stale-threshold-hours: 24
    unavailable-threshold-hours: 48
  screening:
    idempotency-guard-minutes: 15
    disclaimer-text: "This search result is provided for informational purposes only. Data is sourced from Hungarian government registries and may not reflect real-time status."
  data-source:
    mode: demo
    connect-timeout-ms: 1000
    read-timeout-ms: 2000
    global-deadline-seconds: 5
  async-ingestor:
    cron: "-"                          # Disabled in test profile (scheduling also disabled above)
    delay-between-requests-ms: 0       # No delay in tests — unit tests control this via mock properties
  watchlist-monitor:
    cron: "-"                          # Disabled in test profile (scheduling also disabled above)
    delay-between-evaluations-ms: 0    # No delay in tests
  email:
    enabled: false                     # No actual email delivery in tests
    resend-api-key: ""
  outbox:
    cron: "-"                          # Disabled in test profile (scheduling also disabled above)
    batch-size: 10

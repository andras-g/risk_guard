buildscript {
	repositories {
		mavenCentral()
	}
	dependencies {
		classpath 'org.flywaydb:flyway-core:10.20.1'
		classpath 'org.flywaydb:flyway-database-postgresql:10.20.1'
		classpath 'org.postgresql:postgresql:42.7.5'
	}
}

plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.3'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'org.graalvm.buildtools.native' version '0.11.4'
	id 'nu.studer.jooq' version '9.0'
	id 'org.springdoc.openapi-gradle-plugin' version '1.9.0'
}

group = 'hu.riskguard'
version = '0.0.1-SNAPSHOT'
description = 'Partner risk screening and EPR compliance platform for Hungarian SMEs'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

// StructuredTaskScope is a preview API in Java 25
tasks.withType(JavaCompile).configureEach {
	options.compilerArgs.add('--enable-preview')
}

tasks.withType(Test).configureEach {
	jvmArgs '--enable-preview'
}

tasks.withType(JavaExec).configureEach {
	jvmArgs '--enable-preview'
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

ext {
	set('springModulithVersion', "2.0.3")
	set('jooqDbUrl', "jdbc:postgresql://localhost:5432/${project.findProperty('dbName') ?: 'riskguard'}")
	set('jooqDbUser', project.findProperty('dbUser') ?: 'riskguard')
	set('jooqDbPassword', project.findProperty('dbPassword') ?: 'localdev')
}

dependencies {
	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'
	testCompileOnly 'org.projectlombok:lombok'
	testAnnotationProcessor 'org.projectlombok:lombok'

	implementation 'org.springframework.boot:spring-boot-starter-actuator'

	// JPA is required for Spring Modulith event publication (JPA-based) and schema validation.
	// All domain persistence uses jOOQ exclusively — no JPA repositories or @Entity annotations.
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-jooq'
	implementation 'org.springframework.boot:spring-boot-starter-flyway'
	implementation 'org.flywaydb:flyway-database-postgresql'
	implementation 'com.resend:resend-java:4.13.0'
	implementation 'org.springframework.boot:spring-boot-starter-security-oauth2-client'
	implementation 'org.springframework.boot:spring-boot-starter-security-oauth2-resource-server'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'
	
	implementation 'org.springframework.modulith:spring-modulith-starter-core'
	implementation 'org.springframework.modulith:spring-modulith-starter-jpa'
	
	implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'
	
	runtimeOnly 'org.postgresql:postgresql'
	// Cloud SQL Auth Proxy socket connector — required for Cloud Run → Cloud SQL (socket-based, no public IP)
	// Provides com.google.cloud.sql.postgres.SocketFactory used in application-prod.yml JDBC URL
	implementation 'com.google.cloud.sql:postgres-socket-factory:1.21.0'
	// Structured JSON logging for GCP Cloud Logging (prod profile).
	// Handles multi-line exceptions and stack traces correctly unlike PatternLayoutEncoder.
	runtimeOnly 'net.logstash.logback:logstash-logback-encoder:8.0'
	// SpringDoc OpenAPI — exposes /v3/api-docs endpoint for OpenAPI spec generation.
	// Required by the springdoc-openapi-gradle-plugin which boots the app and scrapes this endpoint.
	// Version 3.x is required for Spring Boot 4.x / Spring Framework 7.x compatibility.
	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-api:3.0.2'

	// Story 3.2: Caffeine cache for brute-force login protection (per-email rate limiting)
	implementation 'com.github.ben-manes.caffeine:caffeine:3.2.0'

	// Story 2.2: Data source dependencies (Resilience4j for circuit breaker + retry on external adapters)
	implementation 'io.github.resilience4j:resilience4j-spring-boot3:2.2.0'
	implementation 'org.springframework:spring-aspects'
	implementation 'org.aspectj:aspectjweaver'

	// Story 8.1: NAV Online Számla client — JAXB runtime + Bouncy Castle SHA3-512
	implementation 'jakarta.xml.bind:jakarta.xml.bind-api:4.0.2'
	runtimeOnly 'com.sun.xml.bind:jaxb-impl:4.0.5'
	implementation 'org.bouncycastle:bcprov-jdk18on:1.79'

	// Story 9.3: Google Application Default Credentials for Vertex AI Gemini REST calls.
	// Spring AI 1.x is not compatible with Spring Boot 4.0.3 (Spring Framework 7.x), so we
	// call the Gemini generateContent REST API directly using java.net.http.HttpClient.
	// google-auth provides GoogleCredentials.getApplicationDefault() for ADC token refresh.
	// postgres-socket-factory already pulls google-auth transitively, but we declare it
	// explicitly to avoid accidental removal.
	implementation 'com.google.auth:google-auth-library-oauth2-http:1.23.0'

	
	developmentOnly 'org.springframework.boot:spring-boot-devtools'
	developmentOnly 'org.springframework.boot:spring-boot-docker-compose'
	
	jooqGenerator 'org.postgresql:postgresql'
	
	annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
	
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.security:spring-security-test'
	testImplementation 'org.springframework.boot:spring-boot-testcontainers'
	testImplementation 'org.springframework.modulith:spring-modulith-starter-test'
	testImplementation 'com.tngtech.archunit:archunit-junit5:1.3.0'
	testImplementation 'com.h2database:h2'
	testImplementation 'org.testcontainers:postgresql:1.20.4'

	testImplementation 'org.testcontainers:junit-jupiter:1.20.4'
	testImplementation 'org.wiremock:wiremock-standalone:3.10.0'

	
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

dependencyManagement {
	imports {
		mavenBom "org.springframework.modulith:spring-modulith-bom:${springModulithVersion}"
	}
}

openApi {
	apiDocsUrl.set("http://127.0.0.1:8080/v3/api-docs")
	outputDir.set(file("$buildDir/generated"))
	outputFileName.set("openapi.json")
	waitTimeInSeconds.set(60)
}

tasks.named('generateOpenApiDocs') {
	dependsOn tasks.named('forkedSpringBootRun')
	finalizedBy tasks.named('forkedSpringBootStop')
}

jooq {
	version = '3.19.30'
	configurations {
		main {
			generationTool {
			jdbc {
				driver = 'org.postgresql.Driver'
				url = jooqDbUrl
				user = jooqDbUser
				password = jooqDbPassword
			}
				generator {
					database {
						name = 'org.jooq.meta.postgres.PostgresDatabase'
						inputSchema = 'public'
					}
					generate {
						deprecated = false
						records = true
						immutablePojos = true
						fluentSetters = true
					}
					target {
						packageName = 'hu.riskguard.jooq'
						directory = 'build/generated-sources/jooq'
					}
					strategy {
						name = 'org.jooq.codegen.DefaultGeneratorStrategy'
					}
				}
			}
		}
	}
}


tasks.register('flywayMigrate') {
	doLast {
		def locations = ['filesystem:src/main/resources/db/migration']
		if (project.hasProperty('flywayExtraLocations')) {
			locations.addAll(project.property('flywayExtraLocations').split(','))
		}
		def flyway = org.flywaydb.core.Flyway.configure()
				.dataSource(jooqDbUrl, jooqDbUser, jooqDbPassword)
				.locations(locations as String[])
				.ignoreMigrationPatterns('*:missing')
				.load()
		flyway.migrate()
	}
}

tasks.named('test') {
	// Increased heap for full test suite: multiple Spring Boot + Testcontainers contexts
	// can exhaust the default 512m heap → OutOfMemoryError. Fixed 2026-03-26.
	jvmArgs '-Xmx1g'
	useJUnitPlatform {
		if (System.getProperty('groups')) {
			includeTags System.getProperty('groups')
		}
		if (System.getProperty('excludedGroups')) {
			excludeTags System.getProperty('excludedGroups')
		}
		if (project.hasProperty('includeLoadTests')) {
			includeTags 'load'
		} else {
			excludeTags 'load'
		}
	}
}

tasks.named('compileJava') {
	dependsOn tasks.named('generateJooq')
	dependsOn tasks.named('xjc')
	dependsOn tasks.named('xjcOkirkapu')
}

// XJC: generate JAXB classes from NAV Online Számla XSD schemas.
// Uses JavaExec with jaxb-xjc directly (bypasses bjornvester plugin catalog limitation).
// Generated classes land in build/generated-sources/jaxb/ — never committed to git.
configurations {
	xjcTool
}

dependencies {
	xjcTool 'com.sun.xml.bind:jaxb-xjc:4.0.5'
	xjcTool 'jakarta.xml.bind:jakarta.xml.bind-api:4.0.2'
	xjcTool 'com.sun.xml.bind:jaxb-impl:4.0.5'
}

def xjcOutputDir = layout.buildDirectory.dir('generated-sources/jaxb')
def xjcNavXsdDir = layout.projectDirectory.dir('src/main/resources/xsd/nav')
def xjcOkirkapuXsdDir = layout.projectDirectory.dir('src/main/resources/xsd/okirkapu')

tasks.register('xjc', JavaExec) {
	description = 'Generate JAXB classes from NAV Online Számla XSD schemas'
	classpath = configurations.xjcTool
	mainClass.set('com.sun.tools.xjc.XJCFacade')

	doFirst {
		mkdir xjcOutputDir.get().asFile
	}

	args = [
		'-catalog', xjcNavXsdDir.file('catalog.xml').asFile.absolutePath,
		'-p', 'hu.riskguard.datasource.internal.generated.nav',
		'-d', xjcOutputDir.get().asFile.absolutePath,
		xjcNavXsdDir.file('invoiceApi.xsd').asFile.absolutePath,
		xjcNavXsdDir.file('invoiceBase.xsd').asFile.absolutePath,
		xjcNavXsdDir.file('invoiceData.xsd').asFile.absolutePath,
		xjcNavXsdDir.file('invoiceAnnulment.xsd').asFile.absolutePath,
		xjcNavXsdDir.file('common.xsd').asFile.absolutePath,
	]

	inputs.dir(xjcNavXsdDir)
	outputs.dir(xjcOutputDir)
}

// XJC: generate JAXB classes from OKIRkapu KG:KGYF-NÉ XSD schema (ADR-0002).
// No external catalog needed — the OKIRkapu XSD has no external schema references.
// Generated classes land in build/generated-sources/jaxb/ alongside NAV classes.
tasks.register('xjcOkirkapu', JavaExec) {
	description = 'Generate JAXB classes from OKIRkapu KG-KGYF-NE XSD schema'
	classpath = configurations.xjcTool
	mainClass.set('com.sun.tools.xjc.XJCFacade')

	doFirst {
		mkdir xjcOutputDir.get().asFile
	}

	args = [
		'-p', 'hu.riskguard.epr.report.internal.generated.okirkapu',
		'-d', xjcOutputDir.get().asFile.absolutePath,
		'-b', xjcOkirkapuXsdDir.file('bindings.xjb').asFile.absolutePath,
		xjcOkirkapuXsdDir.file('KG-KGYF-NE-v1.16.xsd').asFile.absolutePath,
	]

	inputs.dir(xjcOkirkapuXsdDir)
	outputs.dir(xjcOutputDir)
}

sourceSets {
	main {
		java {
			srcDir xjcOutputDir
		}
	}
}

tasks.named('generateJooq') {
	dependsOn tasks.named('flywayMigrate')
}

// bootRun must never be UP-TO-DATE — Spring Boot 4.x + GraalVM native plugin AOT tasks
// can all be UP-TO-DATE when sources haven't changed, causing Gradle to skip the JVM launch.
tasks.named('bootRun') {
	outputs.upToDateWhen { false }
}

// forkedSpringBootRun is used by springdoc-openapi-gradle-plugin to boot the app
// and scrape /v3/api-docs. AOT processing is NOT needed for dev-time OpenAPI generation.
// Gradle 9.x strict validation rejects the implicit classpath→AOT output relationship
// that the plugin's JavaExecFork sets up, so we replace the entire classpath with the
// standard runtime classpath (main source set only — no AOT directories).
tasks.named('forkedSpringBootRun') {
	// Replace classpath with main runtimeClasspath to exclude AOT output directories.
	// The springdoc plugin's JavaExecFork would otherwise inherit bootRun's classpath which
	// includes AOT outputs (:compileAotJava, :processAotResources, :processAot). Those tasks'
	// outputs aren't wired via @InputFiles on JavaExecFork, causing Gradle 9.x implicit-dependency
	// validation errors. Using sourceSets.main.runtimeClasspath avoids this entirely.
	classpath = sourceSets.main.runtimeClasspath
	systemProperty 'spring.aot.enabled', 'false'
	systemProperty 'spring.docker.compose.enabled', 'false'
	systemProperty 'spring.devtools.restart.enabled', 'false'
	systemProperty 'spring.main.lazy-initialization', 'true'
	systemProperty 'spring.main.web-application-type', 'servlet'
	environment 'SPRING_DOCKER_COMPOSE_ENABLED', 'false'
}


processResources {
    // risk-guard-tokens.json is the canonical monorepo config shared by backend and frontend.
    // The file lives in both the monorepo root AND backend/src/main/resources/ for classpath
    // availability (IDE + tests + runtime without requiring a Gradle build step).
    // The root copy is authoritative — this task overwrites the src/main/resources copy during
    // builds to keep them in sync. DuplicatesStrategy.INCLUDE ensures the root copy wins.
    duplicatesStrategy = org.gradle.api.file.DuplicatesStrategy.INCLUDE
    from('../risk-guard-tokens.json') {
        into('.')
    }
}
